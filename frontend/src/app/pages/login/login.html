<div class="min-h-screen bg-[url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center bg-fixed relative">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
  <div class="relative flex items-center justify-center min-h-screen px-4 py-12 z-10">
    <div class="w-full max-w-md">
    <div class="backdrop-blur-xl bg-white/90 border border-green-300 rounded-2xl shadow-2xl p-10">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-700 to-yellow-600">
          FarmChainX
        </h1>
        <p class="text-lg text-gray-700 mt-2">{{ 'PLATFORM_SUBTITLE' | translate }}</p>
      </div>

      <form (ngSubmit)="login()" #f="ngForm" autocomplete="off" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">{{ 'EMAIL_ADDRESS' | translate }}</label>
          <input
            class="w-full px-4 py-3 bg-white border-2 border-green-300 rounded-lg placeholder-gray-400 text-gray-800 focus:outline-none focus:border-green-600 focus:ring-2 focus:ring-green-500/40 transition"
            name="email" type="email" [placeholder]="'abc@gmail.com' | translate" [(ngModel)]="email" required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">{{ 'PASSWORD' | translate }}</label>
          <input
            class="w-full px-4 py-3 bg-white border-2 border-green-300 rounded-lg placeholder-gray-400 text-gray-800 focus:outline-none focus:border-green-600 focus:ring-2 focus:ring-green-500/40 transition"
            name="password" type="password" [placeholder]="'a@#1' | translate" [(ngModel)]="password" required />
        </div>

        <button type="submit" [disabled]="f.invalid"
          class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-3.5 rounded-lg shadow-lg transform hover:scale-[1.02] transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
          {{ 'SIGN_IN' | translate }}
        </button>
      </form>

      <div class="mt-6 text-center space-y-3">
        <p class="text-gray-600 text-sm">
          {{ 'NEW_TO_PLATFORM' | translate }}
          <a routerLink="/register"
            class="font-semibold text-emerald-600 hover:text-emerald-500 hover:underline transition-colors ml-1">
            {{ 'CREATE_ACCOUNT' | translate }}
          </a>
        </p>
      </div>

      <div class="mt-8 flex justify-center">
        <div class="w-16 h-1 bg-gradient-to-r from-green-600 to-yellow-500 rounded-full"></div>
      </div>
    </div>

    <p class="text-center text-gray-300 text-sm mt-6 flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
          clip-rule="evenodd" />
      </svg>
      {{ 'SECURED_BY' | translate }}
    </p>
  </div>
</div>
